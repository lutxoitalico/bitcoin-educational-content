question: Ni antivirus iliyojengwa ndani ya Windows?
answer: Windows Defender
wrong_answers:
  - Kaspersky
  - Norton
  - McAfee
explanation: |
  Windows Defender ni antivirus iliyojengwa ndani ya Windows. Ni
  ni suluhisho salama na la ufanisi kwa ajili ya kulinda mfumo
  kutokana na vitisho.
reviewed: true