question: Ni sifa gani za nenosiri nzuri?
answer: Muda mrefu, ngumu, wa kipekee, na sio msingi wa habari za kibinafsi.
wrong_answers:
  - Mfupi, rahisi na rahisi kukumbuka.
  - Kulingana na maelezo ya kibinafsi kama vile tarehe na majina ya kuzaliwa.
  - Nenosiri sawa kwa akaunti zote.
explanation: |
  Nenosiri nzuri ni ndefu (angalau herufi 12), ngumu
  (mchanganyiko wa herufi kubwa na ndogo, nambari, na
  alama), ya kipekee (haitumiki tena kwa akaunti tofauti), na
  sio kulingana na habari ya kibinafsi.
reviewed: true