question: Kuvinjari kwa faragha ni nini?
answer: Kipengele kinachozuia vivinjari vya mtandao kuhifadhi historia ya kuvinjari, faili za mtandao za muda, data ya fomu, vidakuzi na majina ya watumiaji na manenosiri.
wrong_answers:
  - Kipengele kinachoficha shughuli zako za mtandaoni kutoka kwa mtoa huduma wako wa mtandao.
  - Kipengele kinachokuruhusu kuvinjari mtandao bila kujulikana.
  - Kipengele kinacholinda kifaa chako dhidi ya virusi na programu zingine hasidi.
explanation: |
  Kuvinjari kwa faragha ni kipengele kinachozuia mtandao
  vivinjari kutoka kwa kuhifadhi historia ya kuvinjari, mtandao wa muda
  faili, data ya fomu, vidakuzi, na majina ya watumiaji na nywila.
  Hata hivyo, haifichi shughuli zako za mtandaoni kutoka kwako
  mtoa huduma wa mtandao au kukuruhusu kuvinjari
  mtandao bila kujulikana.
reviewed: true