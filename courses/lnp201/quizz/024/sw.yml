question: Je, ni nini athari ya pamoja ya kufunga saa na ufunguo wa kubatilisha shughuli za Commitment?
answer: Wanawazuia washiriki kudanganya kwa kutoa adhabu ya papo hapo
wrong_answers:
  - Wanapunguza uwezo wa chaneli katika kesi ya kudanganya
  - Wao hufunga moja kwa moja pesa za mtu mwenye hatia
  - Wanalazimisha kufunguliwa kwa kituo kipya ikiwa muamala si sahihi
explanation: |
  Muda na ufunguo wa ubatilishaji huwazuia washiriki kudanganya kwa kuhakikisha kwamba jaribio lolote la kudanganya husababisha hasara ya papo hapo ya fedha kwa mhusika.
