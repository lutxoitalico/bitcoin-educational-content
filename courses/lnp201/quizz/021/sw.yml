question: Je, muda hulinda vipi dhidi ya udanganyifu katika miamala ya Commitment?
answer: Inazuia mhusika aliyekosea kupata pesa zake mara moja
wrong_answers:
  - Hurejesha pesa kiotomatiki kwa tapeli
  - Inaghairi muamala iwapo kuna jaribio la kudanganya
  - Inazuia matumizi ya ufunguo wa kufuta
explanation: |
  Muda huweka ucheleweshaji ambapo mdanganyifu hawezi kurejesha pesa zake, na hivyo kumpa mhusika mwingine fursa ya kujibu.
