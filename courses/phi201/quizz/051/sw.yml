question: Kulingana na Mtakatifu Augustino, ni miji gani miwili inayoishi pamoja ulimwenguni?
answer: Mji wa Mungu na Mji wa Kidunia.
wrong_answers:
  - Mji wa watu na mji wa miungu.
  - Mji wa watakatifu na mji wa wenye dhambi.
  - Mji wa chuo kikuu na mji wa malaika.
  Saint Augustine describes two cities coexisting in the world: the City of God, oriented towards God and the spiritual life, and the Earthly City, centered on human concerns and material matters, each following distinct objectives.
