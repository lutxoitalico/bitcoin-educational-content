question: Kulingana na mshindi wa Tuzo ya Nobel F.A Hayek, ni nini lazima kifanyike ili kuwa na pesa nzuri tena?
answer: Tunaondoa jambo hilo mikononi mwa serikali.
wrong_answers:
  - Tunatoa jambo hilo kwa serikali bora.
  - Tunatoa jambo hilo kwa serikali ya kimabavu.
  - Tunaondoa jambo hilo mikononi mwa watu.
  Hayek says: "I don't believe that we should ever have a good money again, before we take the thing out of the hands of the government. If we can't take them violently out of the hands of the government, all we can do is by some sly or roundabout way introduce something they can't stop."
