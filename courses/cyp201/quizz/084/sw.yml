question: Je, ni jukumu gani la msingi la Bitcoin Address katika muamala?
answer: Funga UTXO kwenye scriptPubKey
wrong_answers:
  - Fungua UTXO kwenye scriptSig
  - Ishara mwisho wa muamala
  - Tambua kizuizi cha uthibitisho
explanation: |
  Bitcoin Address imepachikwa kwenye scriptPubKey ili kufunga UTXO. Inaamua hali muhimu za kufungua fedha.
reviewed: false