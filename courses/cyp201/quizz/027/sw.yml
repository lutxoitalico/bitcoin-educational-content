question: Je, ni udhaifu gani wa sahihi wa ECDSA uliorekebishwa na SegWit?
answer: Uharibifu
wrong_answers:
  - Uthibitishaji wa kundi
  - Ukosefu wa mkusanyiko
  - Saizi kubwa ya saini
explanation: |
  SegWit ilirekebisha uharibikaji wa sahihi za ECDSA, na kuwezesha matumizi kama vile Lightning Network.
reviewed: false