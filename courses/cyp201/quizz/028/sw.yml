question: Ni saizi gani ya kitufe cha umma kilichobanwa kwa kutumia itifaki ya Schnorr?
answer: 32 ka
wrong_answers:
  - 33 ka
  - 64 ka
  - 128 bits
explanation: |
  Kitufe cha umma cha Schnorr kinawakilishwa tu na kiratibu cha x cha ncha kwenye curve ya duaradufu, ambayo hupunguza ukubwa wake hadi baiti 32.
reviewed: false