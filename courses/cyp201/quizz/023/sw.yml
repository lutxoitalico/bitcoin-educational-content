question: Ni hatua gani ya kawaida inayotumiwa na washiriki wote kukokotoa ufunguo wa umma katika Bitcoin?
answer: Sehemu ya jenereta G
wrong_answers:
  - SHA256 Hash
  - Maneno ya Mnemonic
  - Ufunguo wa umma uliobanwa
explanation: |
  Sehemu ya jenereta G ya curve duaradufu secp256k1 inatumika kukokotoa funguo za umma kutoka kwa funguo za kibinafsi.
reviewed: false