question: Ni mali gani ya Schnorr inaruhusu kuchanganya funguo nyingi za umma kuwa moja?
answer: Ukusanyaji Muhimu
wrong_answers:
  - Uthibitishaji wa Kundi
  - Uharibifu
  - Mshikamano wa Sahihi
explanation: |
  Schnorr inaruhusu ujumlishaji wa funguo nyingi za umma kwenye ufunguo mmoja.
