question: Ni sehemu gani ya pato la HMAC-SHA512 inatumika kama msimbo wa mnyororo wa watoto?
answer: Baiti 32 za mwisho
wrong_answers:
  - Baiti 32 za kwanza
  - Baiti 64 nzima
  - SHA256 Hash ya kati baiti 32
explanation: |
  Baiti 32 za mwisho za pato la HMAC-SHA512 hutumika kama msimbo wa mnyororo wa ufunguo wa mtoto.
reviewed: false