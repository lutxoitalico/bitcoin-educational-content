question: Kwa nini maelezo ni muhimu sana kwa pochi zenye saini nyingi?
answer: Zinajumuisha xpub ya kila kipengele na zinaelezea muundo wa saini nyingi
wrong_answers:
  - Wanaondoa hitaji la kifungu cha Mnemonic
  - Wanarahisisha kizazi cha funguo ngumu
  - Wanafanya saini nyingi ziendane na hati zote
explanation: |
  Vifafanuzi ni pamoja na funguo za umma zilizopanuliwa za washiriki wote, ambayo hurahisisha urejeshaji na usimamizi wa usanidi wa saini nyingi.
