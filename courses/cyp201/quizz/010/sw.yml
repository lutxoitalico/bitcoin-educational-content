question: Ni algorithm gani ya uasilia inatumika kukokotoa nambari ya uthibitishaji kulingana na ufunguo wa siri?
answer: HMAC-SHA512
wrong_answers:
  - SHA512
  - SHA256
  - RIPEMD160
explanation: |
  HMAC-SHA512 ni algoriti inayochanganya chaguo za kukokotoa za Hash na ufunguo wa siri ili kukokotoa msimbo wa uthibitishaji.
