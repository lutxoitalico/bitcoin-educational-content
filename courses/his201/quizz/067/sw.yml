question: Ni shirika gani lilianza kukubali Bitcoin mnamo Novemba 2010 kufuatia ushawishi wa jumuiya?
answer: Msingi wa Electronic Frontier
wrong_answers:
  - WikiLeaks
  - Msalaba Mwekundu
  - Amnesty International
explanation: |
  Shirika hili, lililoanzishwa mwaka wa 1900 na Mitch Kapor, John Gilmore, na John Perry Barlow, lililenga kulinda uhuru wa mtandao. Ilianza kukubali Bitcoin mnamo Novemba 9.
reviewed: false