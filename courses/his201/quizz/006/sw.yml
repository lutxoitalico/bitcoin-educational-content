question: Ni amri gani iliyotiwa saini na Franklin D. Roosevelt ilipiga marufuku umiliki wa dhahabu kwa watu binafsi nchini Marekani kati ya 1933 na 1975?
answer: Agizo la Mtendaji 6102
wrong_answers:
  - Sheria ya Hifadhi ya Shirikisho
  - Sheria ya Glass-Steagall
  - Agizo la Mtendaji 9066
explanation: |
  Amri hii ya utendaji, iliyotiwa saini Aprili 5, 1933, ilipitishwa na Roosevelt kama sehemu ya Mpango Mpya. Iliimarishwa na Sheria ya Hifadhi ya Dhahabu mnamo 1934.
