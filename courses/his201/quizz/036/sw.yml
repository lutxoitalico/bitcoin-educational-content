question: Ni nani aliyebuni nembo halisi ya kwanza ya Bitcoin (herufi kubwa ya dhahabu B iliyovuka kwa pau mbili wima) mnamo Februari 2010?
answer: Satoshi Nakamoto
wrong_answers:
  - NewLibertyStandard
  - Marti Malmi
  - kijana mdogo
explanation: |
  Alitumia pendekezo la NewLibertyStandard la kutumia ishara ya baht ya Thai (฿). Nembo ya machungwa iliundwa baadaye na mtu anayejulikana kama bitboy.
