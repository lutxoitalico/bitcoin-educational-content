question: Nani alipendekeza kuwasiliana na shirika la WikiLeaks ili kuwahimiza kukubali Bitcoin mnamo Novemba 2010?
answer: Amir Taaki
wrong_answers:
  - Wladimir van der Laan
  - Robert Horning
  - Satoshi Nakamoto
explanation: |
  Alihalalisha kwa kuandika kwamba shirika lilikuwa limeona fedha zake zikigandishwa mara nyingi. Hasa, Moneybookers walikuwa wamefungia akaunti ya WikiLeaks mwezi Oktoba.
reviewed: false