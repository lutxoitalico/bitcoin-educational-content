question: Jina la mwanzilishi wa Chama cha Maharamia wa Uswidi ambaye alielezea Bitcoin kama Napster ya benki mnamo Mei 2011 ni nani?
answer: Rick Falkvinge
wrong_answers:
  - Smári McCarthy
  - Edward Snowden
  - Florian Hufsky
explanation: |
  Mpenzi wa uhuru, Bitcoin alionekana kwake kuwa wazo zuri alipoligundua. Amekuwa mtangazaji mkuu wa cryptocurrency katika miaka iliyofuata.