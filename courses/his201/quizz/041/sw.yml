question: Je, ni tarehe gani Jeremy Sturdivant aliwasilisha pizza mbili kwa Laszlo Hanyecz katika Exchange kwa malipo ya bitcoins 10,000, kuashiria ununuzi wa kwanza wa bidhaa halisi kwa cryptocurrency?
answer: Mei 22, 2010
wrong_answers:
  - Oktoba 12, 2009
  - Aprili 18, 2010
  - Juni 11, 2010
explanation: |
  Kufuatia tangazo lililowekwa kwenye jukwaa, toleo lilikubaliwa Mei 22, 2010. Wakati huo, bitcoins 10,000 zilikuwa na thamani ya karibu $44.
reviewed: false