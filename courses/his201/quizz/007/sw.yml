question: Je, ni sarafu gani inayotokana na dhahabu na fedha iliundwa na Bernard von NotHaus mwaka wa 1998?
answer: Dola ya Uhuru
wrong_answers:
  - Hifadhi ya Uhuru
  - e-dhahabu
  - GoldMoney
explanation: |
  Sarafu hii ilipatikana katika mfumo wa sarafu za fedha na noti za mwakilishi, na kisha katika mfumo wa dijiti kuanzia 2003.
reviewed: false