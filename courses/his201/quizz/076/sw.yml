question: Nani alizindua mfumo wa Mapendekezo ya Uboreshaji wa Bitcoin, mchakato unaolenga kuratibu uboreshaji wa Bitcoin, mnamo Septemba 2011?
answer: Amir Taaki
wrong_answers:
  - Gavin Andresen
  - Jeff Garzik
  - Nils Schneider
explanation: |
  Mfumo huu uliigwa baada ya Mapendekezo ya Kuboresha Chatu (PEP) mahususi kwa lugha ya programu ya Chatu.
reviewed: false