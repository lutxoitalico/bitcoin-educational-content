question: Je, ni mwaka gani mfumo wa Hifadhi ya Uhuru ulifungwa na mamlaka ya Marekani?
answer: 2013
wrong_answers:
  - 2007
  - 2009
  - 2011
explanation: |
  Mnamo Mei 24, 2013, mwanzilishi wake, Arthur Budovsky, na washirika wake wakuu walishtakiwa na kukamatwa, na tovuti kuu ilichukuliwa na Idara ya Haki ya Marekani.
reviewed: false