question: Ni watafiti gani waliotajwa na Satoshi Nakamoto kwenye karatasi nyeupe ya Bitcoin kwa kazi yao ya uwekaji alama wa nyakati ulioidhinishwa?
answer: Stuart Haber na Scott Stornetta
wrong_answers:
  - Leslie Lamport, Robert Shostak, na Marshall Pease
  - Cynthia Dwork na Moni Naor
  - Ronald Rivest na Adi Shamir
  Three papers by Haber and Stornetta from the 90s were cited in the white paper. They are known for creating [the first timestamped blockchain](https: //www.vice.com/en/article/j5nzx4/what-was-the-first-blockchain), published in the New York Times starting in 1992.
