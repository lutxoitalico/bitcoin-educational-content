question: Ni nini moja ya matokeo ya dola?
answer: Kupoteza sera ya fedha ya uhuru
wrong_answers:
  - Kuongezeka kwa mfumuko wa bei
  - Ongezeko la pesa Supply
  - Kupungua kwa uaminifu wa umma
explanation: |
  Dollarization inaweza kumaliza mfumuko wa bei, lakini inatoa nyingine za kiuchumi
  changamoto. Moja ya matokeo ni kupotea kwa sera ya fedha inayojitegemea. Bila
  sarafu yake yenyewe, nchi haiwezi kurekebisha sera yake ya fedha ili kukabiliana na mambo ya ndani
  majanga ya kiuchumi.
