question: Je, ni madhara gani ya mara moja ya kupungua kwa viwango vya riba kutokana na ongezeko la mikopo kulingana na Nadharia ya Austria ya Mzunguko wa Biashara?
answer: Wajasiriamali wanaweza kukopa rasilimali zaidi na hivyo kuunda hatua za juu za uzalishaji. Upanuzi huu wa muundo wa uzalishaji hautasababisha kupungua kwa matumizi kwa sababu kumekuwa hakuna kuahirishwa kwa matumizi ya sasa ya matumizi. Kwa maneno mengine, Pato la Taifa linakua.
