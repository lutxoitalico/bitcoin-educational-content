question: Ni nini sababu ya unyogovu kulingana na wafadhili na watu wa Keynesi?
answer: Mahitaji ya jumla yasiyotosha
wrong_answers:
  - Uzalishaji kupita kiasi
  - Viwango vya juu vya riba
  - Mfumuko wa bei wa juu
explanation: |
  Kwa wenye pesa na Wakenesia, sababu ya unyogovu ni
  mahitaji ya jumla ya kutosha. Wanaamini kwamba kutoa motisha
  kwa upanuzi wa mikopo (kupunguza viwango vya riba) na kutumia serikali
  upungufu wa uwezo wa kuongeza mahitaji utaanza ahueni.
reviewed: true