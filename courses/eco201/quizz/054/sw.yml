question: Ni tofauti gani kuu kati ya wanauchumi wa Austria na wachumi wa Keynesian au wachumi wa pesa katika suala la njia zao za uchanganuzi?
answer: Ingawa Waustria wanasababu kutokana na mihimili ya kimsingi, wachumi wa Keynesi au wachumi wa pesa huwa wanategemea data ya majaribio.
wrong_answers:
  - Wanauchumi wa Austria wanategemea data ya majaribio, huku wachumi wa Keynesi au wachumi wa pesa wanasababu kutokana na mihimili ya kimsingi.
  - Wanauchumi wa Austria na wachumi wa Keynesian au wachumi hutumia mbinu sawa za uchanganuzi.
  - Wanauchumi wa Austria wanategemea sera za serikali, huku wachumi wa Keynesi au wachumi wanategemea nguvu ya soko.
explanation: |
  Tofauti kuu kati ya wanauchumi wa Austria na Keynesian au monetast
  wanauchumi katika suala la mbinu zao za uchambuzi ni kwamba wakati Austrians sababu
  kutoka kwa misemo ya kimsingi ambayo makato ya kimantiki yanaweza kufanywa, Keynesian au
  wanauchumi wa monetarist huwa wanategemea data ya majaribio ili kuanzisha sheria za jumla za uchumi.
reviewed: true