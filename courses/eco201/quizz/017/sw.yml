question: Kulingana na wanauchumi wa Austria, ni nini kinachochochea mchakato wa ushirikiano wa kijamii?
answer: Faida ya uzalishaji inayotokana na mgawanyiko wa kazi.
wrong_answers:
  - Tamaa ya mwingiliano wa kijamii na jamii.
  - Haja ya ulinzi na usalama.
  - Kutafuta mali na madaraka.
explanation: |
  Wanauchumi wa Austria, haswa Ludwig Von Mises, wanahitimisha
  kwamba faida ya uzalishaji inayotokana na mgawanyiko wa
  kazi ndio nguvu inayoendesha mchakato wa kijamii
  ushirikiano. Hii ni kwa sababu watu binafsi daima ni bora
  mbali wanapobobea katika kazi zao na kujishughulisha
  kubadilishana.
reviewed: true