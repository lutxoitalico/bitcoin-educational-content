question: Ni nini lengo kuu la uchumi wa Austria?
answer: Uchumi wa Austria unasisitiza maono ya kiasi zaidi ya ukuaji na busara ya kibinadamu.
wrong_answers:
  - Uchumi wa Austria unazingatia uchapishaji wa fedha na matumizi ili kukuza ukuaji.
  - Uchumi wa Austria unasisitiza ujumuishaji wa nguvu za kifedha.
  - Uchumi wa Austria unazingatia uzalishaji na usimamizi wa pesa na serikali kuu
explanation: |
  Sura hiyo inaeleza kuwa uchumi wa Austria unasisitiza a
  maono ya kiasi zaidi ya ukuaji na busara ya kibinadamu katika yetu
  uchumi, tofauti sana na mafundisho ya Keynesian.
reviewed: true