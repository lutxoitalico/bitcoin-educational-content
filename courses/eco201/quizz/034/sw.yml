question: Nadharia ya Austria ya Mzunguko wa Biashara ni nini?
answer: Nadharia ya Austria ya Mzunguko wa Biashara ni nadharia inayofafanua mizunguko ya kiuchumi kama mienendo endojeni ya mfumo wa benki ya hifadhi ya sehemu, ikisisitiza asili ya mfuatano wa hatua za binadamu na athari za kushuka kwa kiwango cha riba kwenye uratibu wa baina ya wakati wa mawakala wa kiuchumi.
wrong_answers:
  - Nadharia ya Austria ya Mzunguko wa Biashara ni nadharia inayoelezea mizunguko ya kiuchumi kama matokeo ya matukio ya nje na roho za wanyama.
  - Nadharia ya Austria ya Mzunguko wa Biashara ni nadharia inayoelezea mizunguko ya kiuchumi kama matokeo ya mabadiliko ya mahitaji ya jumla na Supply.
  - Nadharia ya Austria ya Mzunguko wa Biashara ni nadharia inayofafanua mizunguko ya kiuchumi kama matokeo ya mabadiliko katika viwango vya ajira, Pato la Taifa, au faharasa ya bei ya watumiaji.
explanation: |
  Nadharia ya Austria ya Mzunguko wa Biashara, iliyotengenezwa na Ludwig Von Mises
  na Friedrich Hayek, anaelezea mizunguko ya kiuchumi kama mienendo ya asili ya sehemu
  mfumo wa benki ya hifadhi. Inasisitiza asili ya mfuatano wa hatua ya mwanadamu na
  athari za kushuka kwa kiwango cha riba kwenye uratibu wa baina ya muda wa uchumi
  mawakala.
reviewed: true