question: Ni nini kinachotofautisha Bitcoin na sarafu za jadi zinazodhibitiwa na benki kuu au serikali?
answer: Wote
wrong_answers:
  - Bitcoin inahitaji ushirikiano kati ya wachimbaji madini, nodi, na watengenezaji
  - Bitcoin inaruhusu mtu yeyote kushiriki katika mtandao na kutekeleza majukumu muhimu
  - Bitcoin inategemea mfumo wa ugatuzi wa makubaliano
explanation: |
  Kinachotofautisha Bitcoin na sarafu za kitamaduni za fiat ni kwamba ni a
  juhudi za ushirikiano kati ya majukumu matatu muhimu na jamii.
  Nodi huhakikisha uadilifu na usalama wa mtandao kwa kutumika kama walinzi wa lango.
  Wachimbaji madini wanawajibika kwa usindikaji wa miamala na kudumisha Blockchain.
  Wasanidi programu ni wanachama wenye ujuzi wa juu wa jumuiya ya Bitcoin wanaofanya kazi pamoja
  kudumisha na kuboresha programu inayowezesha mtandao.
  Jumuiya, kupitia matumizi ya Bitcoin, ndiyo inayoipa thamani.
  Kila moja ya majukumu haya ni muhimu kwa utendakazi na mafanikio ya Bitcoin kama a
  sarafu ya kidijitali. Kwa kukabidhi majukumu haya muhimu kwa wachezaji muhimu, Bitcoin inaweza
  inafanya kazi kama njia iliyogatuliwa, salama, uwazi na inayowajibika ya Exchange kwa
  watumiaji wote, na kuifanya kuwa tofauti sana na sarafu za serikali kuu tunazotumia leo.
reviewed: true