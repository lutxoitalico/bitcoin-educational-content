question: Ni dhana gani ambayo haihusiani pekee na mifumo ya kriptografia linganifu au asymmetric?
answer: Kazi za Hash
wrong_answers:
  - Jozi za funguo za umma na za kibinafsi
  - Kriptografia isiyolinganishwa
  - Siri linganifu
explanation: |
  Chaguo za kukokotoa za Hash ni sehemu kuu ya usimbaji fiche wa kisasa, lakini hazihusiani mahususi na mipango ya ulinganifu au isiyolingana, tofauti na funguo za umma na za kibinafsi.
reviewed: false