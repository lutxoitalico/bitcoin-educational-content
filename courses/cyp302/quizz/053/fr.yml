question: Comment appelle-t-on un corps avec un nombre fini d'éléments ?
answer: Un corps de Galois
wrong_answers:
  - Un corps multiplicatif
  - Un corps symétrique
  - Un corps vectoriel
explanation: |
  Un corps fini est également connu sous le nom de corps de Galois, en référence aux travaux du mathématicien Évariste Galois, et il est essentiel dans la cryptographie moderne.
reviewed: false
