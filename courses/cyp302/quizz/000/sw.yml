question: Ni nani aliyekabidhi sanduku la chuma kwa mlinzi wa nyumba ya wageni Robert Morriss kwa usalama?
answer: Thomas J. Beale
wrong_answers:
  - Kata ya J.B
  - Simon Singh
  - Andrew Allen
explanation: |
  Ilikuwa ni Thomas J. Beale aliyekabidhi sanduku la chuma lililokuwa na hati zilizosimbwa na barua kwa Robert Morriss, akimpa maagizo ikiwa hatarudi.
reviewed: false