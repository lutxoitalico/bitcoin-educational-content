question: Dans un corps fini, quel est le rôle d'un polynôme irréductible ?
answer: Définir les opérations de multiplication dans le corps
wrong_answers:
  - Définir l'inverse additif de chaque élément
  - Assurer la fermeture du corps
  - Déterminer l'identité multiplicative
explanation: |
  Les polynômes irréductibles sont utilisés pour structurer la multiplication dans les corps finis, ce qui garantit que chaque élément reste dans le corps.
