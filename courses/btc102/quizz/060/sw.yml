question: Hot Wallet ni nini katika muktadha wa Bitcoin?
answer: Wallet ya kuhifadhi kiasi kidogo cha Bitcoin mtandaoni
wrong_answers:
  - Wallet ambayo inatumika kwa shughuli katika hali ya hewa ya Hot
  - Wallet ambayo hutumika kuhifadhi kiasi kikubwa cha Bitcoin
  - Wallet ambayo hutumika kuhifadhi Bitcoin kwa muda mrefu
explanation: |
  Hot Wallet ni Wallet ya kuhifadhi kiasi kidogo cha Bitcoin mtandaoni.
  Inachukuliwa kuwa isiyo salama kuliko Cold Wallet kwani iko katika hatari ya kudukuliwa.
