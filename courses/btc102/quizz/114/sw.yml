question: Je, madhumuni ya mpango wa urithi katika Bitcoin ni nini?
answer: Ili kuhakikisha kwamba wapendwa wako wanaweza kupata Bitcoins yako baada ya kifo chako.
wrong_answers:
  - Ili kuchimba Bitcoins mpya.
  - Kufanya biashara ya Bitcoins.
  - Kubadilisha Bitcoins kuwa cryptocurrencies nyingine.
explanation: |
  Mpango wa urithi katika Bitcoin ni mpango unaohakikisha kwamba mpendwa wako
  wale wanaweza kupata Bitcoins yako baada ya kifo chako. Haitumiki kwa Bitcoins mpya za Mining,
  kufanya biashara ya Bitcoins, au kubadilisha Bitcoins hadi sarafu nyingine za siri.
reviewed: false