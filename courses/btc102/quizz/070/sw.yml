question: Je, ni muda gani wa chini zaidi wa kusubiri unaopendekezwa kwa Hodler?
answer: Angalau mzunguko mmoja au miwili.
wrong_answers:
  - Chini ya mwaka mmoja.
  - Miaka mitano hadi kumi.
  - Hakuna kipindi cha chini cha kusubiri.
explanation: |
  Sura inapendekeza kwamba Hodler anapaswa kusubiri angalau moja au mbili
  mzunguko ili kuona ukuaji wa uwekezaji wao.
reviewed: false