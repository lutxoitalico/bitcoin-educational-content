question: Ni njia gani ya kawaida kwa stacker ya Bitcoin kutumia Bitcoin?
answer: Kwa namna ya rika-kwa-rika
wrong_answers:
  - Kupitia broker
  - Kwa kuuza bidhaa au huduma
  - Kwa kujihusisha katika mfumo ikolojia wa Bitcoin
explanation: |
  Mbinu ya kawaida kwa staka ya Bitcoin kutumia Bitcoin ni ya rika-kwa-rika
  namna. Hii inamaanisha kuwa wanaweza kununua Bitcoin moja kwa moja kwa pesa taslimu na marafiki au wanachama
  wa jumuiya ya Bitcoin.
reviewed: false