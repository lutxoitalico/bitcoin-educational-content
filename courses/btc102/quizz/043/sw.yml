question: Ni sababu gani kuu kwa nini serikali na benki kuu zinachunguza uwezekano wa kuunda toleo la dijiti la sarafu yao ya fiat?
answer: Ili kuhakikisha udhibiti na kuzingatia kanuni za mitaa
wrong_answers:
  - Ili kushindana na Bitcoin
  - Ili kutoa ulinzi wa faragha
  - Kuongeza ufuatiliaji wa watu wengi
explanation: |
  Maudhui ya sura yanaeleza kuwa wakati miradi hii inadai kushindana
  na Bitcoin, wanabaki kuwa serikali kuu ili kuhakikisha udhibiti na kuzingatia
  kanuni za mitaa.
