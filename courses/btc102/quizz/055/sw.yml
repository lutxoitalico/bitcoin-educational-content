question: Lightning Network ni nini?
answer: Ni Layer ya pili ya Bitcoin.
wrong_answers:
  - Ni cryptocurrency Exchange.
  - Ni aina ya Bitcoin Wallet.
  - Ni Bitcoin Mining pool.
explanation: |
  Lightning Network ni teknolojia ya pili ya Layer inayotumika kwa Bitcoin
  ambayo hutumia njia ndogo za malipo ili kuongeza uwezo wake wa kufanya kazi wa Blockchain
  shughuli.
reviewed: false