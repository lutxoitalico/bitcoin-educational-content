question: Ni nini sifa kuu ya kisaikolojia ya Hodler?
answer: Subira.
wrong_answers:
  - Msukumo.
  - Maono ya muda mfupi.
  - Ukosefu wa nidhamu.
explanation: |
  Hodler anaonyesha uvumilivu wa kipekee, tayari kungoja kwa miaka
  kuona ukuaji wa uwekezaji wao, bila kuathiriwa na soko la muda mfupi
  kushuka kwa thamani.
reviewed: false