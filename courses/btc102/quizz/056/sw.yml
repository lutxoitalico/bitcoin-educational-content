question: Je, maono ya mwisho ya Bitcoin ni yapi kulingana na sitiari ya barabara kuu ya Bitcoin?
answer: Itakuwa barabara kuu ya trafiki ya mtandao na kwa 90% ya idadi ya watu duniani.
wrong_answers:
  - Itakuwa nzuri ya anasa kupatikana tu kwa matajiri.
  - Itakuwa chombo cha shughuli haramu.
  - Itapitwa na wakati na kubadilishwa na fedha zingine za siri.
explanation: |
  Sitiari ya barabara kuu ya Bitcoin inawaza Bitcoin kuwa barabara kuu ya
  trafiki ya mtandao na kwa 90% ya idadi ya watu duniani, na bidhaa na huduma
  kufikiwa moja kwa moja kwenye barabara hii kuu.
reviewed: false