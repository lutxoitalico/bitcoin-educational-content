question: Ni mfano gani mashuhuri wa Bitcoin Hard Fork?
answer: Bitcoin Cash (BCH)
wrong_answers:
  - Ethereum (ETH)
  - Litecoin (LTC)
  - Ripple (XRP)
explanation: |
  Bitcoin imepitia uma kadhaa wa Hard kwa wakati, na kusababisha anuwai
  matoleo mbadala ya sarafu halisi. Mifano mashuhuri ya mikengeuko hii
  ni pamoja na Bitcoin Cash (BCH) na Bitcoin Satoshi Vision (BSV).
reviewed: false