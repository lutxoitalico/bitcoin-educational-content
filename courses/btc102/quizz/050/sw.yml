question: Je, ni sifa gani kuu ya Bitcoin inayoitofautisha na fedha zingine za siri?
answer: Bitcoin ndiyo sarafu pekee iliyogatuliwa, inayostahimili udhibiti, isiyolipishwa na yenye umakini mkubwa.
wrong_answers:
  - Bitcoin ndiyo sarafu-fiche pekee inayoweza kuchimbwa
  - Bitcoin ndiyo sarafu-fiche pekee inayoweza kununuliwa au kuuzwa kwenye majukwaa ya Exchange
  - Bitcoin ndiyo sarafu-fiche pekee inayoweza kuhifadhiwa kwenye Wallet
explanation: |
  Yaliyomo kwenye sura yanasema kuwa Bitcoin ndiyo pekee iliyogatuliwa kwa kweli,
  inayostahimili udhibiti, isiyolipishwa, na sarafu ya siri kali ambayo inahalalisha maelfu
  ya saa za kazi. Hii ni sifa kuu inayoweka Bitcoin kando na nyingine
  fedha za siri.
reviewed: false