question: Je, ni faida gani moja ya kutumia jukwaa la Exchange kununua na kuuza bitcoins?
answer: Inaruhusu shughuli za kawaida kulingana na mahitaji ya mtumiaji.
wrong_answers:
  - Inaruhusu shughuli zisizojulikana.
  - Inaongeza thamani ya Bitcoin.
  - Inatoa jukwaa la Mining Bitcoin.
explanation: |
  Majukwaa ya Exchange huruhusu watumiaji kununua na kuuza bitcoins mara kwa mara na
  kwa urahisi, kulingana na mahitaji yao.
reviewed: false