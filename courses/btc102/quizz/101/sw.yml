question: Je, ni sharti gani za kuunda mpango wa urithi kulingana na sura?
answer: Wakati wa utulivu, bila vikwazo; Karatasi 4-5 za karatasi nyeupe; kalamu; Bahasha mbili; Kitabu cha simu/Address; Kompyuta (hiari)
wrong_answers:
  - Mazingira yenye kelele; karatasi 10-15 za karatasi nyeupe; Penseli; Bahasha tano; Kitabu cha simu/Address; Kompyuta (ya lazima)
  - Wakati wa utulivu, bila vikwazo; Karatasi 1-2 za karatasi nyeupe; Alama; Bahasha moja; Kitabu cha simu/Address; Kompyuta (hiari)
  - Wakati wa utulivu, na vikengeusha-fikira; Karatasi 4-5 za karatasi nyeupe; kalamu; Bahasha mbili; Kitabu cha simu/Address; Kompyuta (hiari)
explanation: |
  Sura hiyo inapendekeza kwamba unahitaji wakati wa utulivu, bila
  usumbufu; Karatasi 4-5 za karatasi nyeupe; kalamu; bahasha mbili; kitabu cha simu/Address; na kompyuta
  (ambayo ni ya hiari) kuunda mpango wa urithi.
reviewed: false