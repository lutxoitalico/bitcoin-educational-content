question: Je, ni hatari gani kuu ya kuacha bitcoins zako kwenye jukwaa la Exchange?
answer: Jukwaa linaweza kudukuliwa, kukamatwa, kufilisika, au kutoweka na pesa zako
wrong_answers:
  - Bei ya Bitcoin inaweza kushuka ghafla
  - Jukwaa linaweza kuongeza ada zake
  - Jukwaa linaweza kupunguza idadi ya bitcoins unaweza kununua au kuuza
explanation: |
  Maudhui ya sura yanaonya kuwa majukwaa ya Exchange yanawasilisha muhimu
  hatari na inapaswa kuepukwa iwezekanavyo. Wanaweza kudukuliwa, kukamatwa, kwenda
  kufilisika, au kutoweka tu na pesa zako.
reviewed: false