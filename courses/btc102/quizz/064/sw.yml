question: Ni suluhisho gani linalopendekezwa kwa ununuzi wa mara kwa mara wa Bitcoin bila mafadhaiko?
answer: Tumia suluhisho la DCA
wrong_answers:
  - Tumia Hot Wallet
  - Tumia Cold Wallet
  - Tumia suluhisho lisilo la KYC
explanation: |
  Suluhisho lililopendekezwa la ununuzi wa mara kwa mara wa Bitcoin bila mafadhaiko
  ni kutumia suluhisho la DCA (Wastani wa Gharama ya Dola). Mkakati huu unahusisha kugawa
  jumla ya kiasi unachotaka kuwekeza katika ununuzi wa mara kwa mara ili kupunguza athari
  ya tete.
reviewed: false