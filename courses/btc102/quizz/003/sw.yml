question: Ni mbinu gani ya kawaida inayotumiwa na washawishi wa crypto au gurus?
answer: Kukuza sarafu za siri zisizotegemewa.
wrong_answers:
  - Kukuza mali za kimwili.
  - Kukuza sarafu za fiat.
  - Kukuza bidhaa za programu.
explanation: |
  Washawishi wa Crypto au gurus mara nyingi huwa na ajenda za kibinafsi na wanaweza kuhusika
  katika miradi mingi ambayo wanatafuta kukuza, hata kama hawako kila wakati
  maslahi bora ya wawekezaji. Washawishi hawa wanaweza kujaribu kukuza watu wasioaminika
  sarafu za siri, au shitcoins.
reviewed: false