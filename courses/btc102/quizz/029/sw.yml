question: Je, kuna umuhimu gani wa uhaba wa Bitcoin?
answer: Kutakuwa na bitcoins milioni 21 tu duniani na kamwe zaidi
wrong_answers:
  - Thamani ya Bitcoin itaongezeka kila wakati
  - Bitcoin ni ngumu kuchimba
  - Shughuli za Bitcoin ni chache kwa idadi
explanation: |
  Uhaba wa Bitcoin unarejelea ukweli kwamba kutakuwa na 21 tu
  bitcoins milioni. Tabia hii, sawa na dhahabu, inazuia dilution ya
  Thamani ya Bitcoin kupitia uchapishaji wa pesa nyingi.
