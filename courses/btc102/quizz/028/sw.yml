question: Inamaanisha nini kuwa Bitcoin ni chanzo wazi?
answer: Mtu yeyote anaweza kuangalia jinsi Bitcoin inavyofanya kazi, ni ya uwazi na kwa hiyo inaweza kukaguliwa
wrong_answers:
  - Mtu yeyote anaweza kuunda toleo lake la Bitcoin
  - Bitcoin ni bure kutumia
  - Msimbo wa Bitcoin unapatikana kwa umma ili kurekebishwa
explanation: |
  Kuwa chanzo huria kunamaanisha kuwa msimbo wa Bitcoin unapatikana kwa umma
  mtu yeyote kukagua. Hii inafanya uwazi na ukaguzi, kuhakikisha kwamba itifaki
  ni sawa kwa kila mtu.
reviewed: false