question: Ni tofauti gani kuu kati ya Bitcoin na alt-coins katika suala la ugatuaji?
answer: Bitcoin imegatuliwa wakati sarafu nyingi za alt hazijagawanywa
wrong_answers:
  - Bitcoin na alt-coins zote mbili zinagatuliwa
  - Bitcoin na alt-coins zote hazijagatuliwa
  - Alt-sarafu zinagatuliwa wakati Bitcoin haijagawanywa
explanation: |
  Yaliyomo kwenye sura yanasema wazi kuwa Bitcoin imegatuliwa wakati
  sarafu nyingi za alt sio. Hii ni sifa kuu inayoweka Bitcoin kando na
  fedha zingine za crypto.
reviewed: false