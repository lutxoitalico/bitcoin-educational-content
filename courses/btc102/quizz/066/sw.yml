question: Je, ni Wallet inayopendekezwa kwa Hodler kuanza nayo nini?
answer: Cold Wallet kama Bitbox02, Trezor, au Ledger.
wrong_answers:
  - Programu ya simu ya Hot Wallet.
  - Wallet ya kimwili.
  - Karatasi ya Wallet.
explanation: |
  Kwa Hodler, inashauriwa kuanza na Cold Wallet kama Bitbox02,
  Trezor, au Ledger. Vifaa hivi hutoa usalama kwa bitcoins kwa muda mrefu.
reviewed: false