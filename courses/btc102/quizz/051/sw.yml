question: Je, kazi ya Lightning Network katika mfumo ikolojia wa Bitcoin ni nini?
answer: Inaruhusu Bitcoin kupanua na kupata vipengele zaidi kwa kutenda kama Layer ya pili.
wrong_answers:
  - Ni cryptocurrency tofauti ambayo inashindana na Bitcoin.
  - Ni zana ya Mining Bitcoin.
  - Ni jukwaa la biashara ya Bitcoin.
explanation: |
  Lightning Network ni teknolojia ya pili ya Layer inayotumika kwa Bitcoin
  ambayo hutumia njia ndogo za malipo ili kuongeza uwezo wake wa kufanya kazi wa Blockchain
  shughuli kwa ufanisi zaidi.
reviewed: false