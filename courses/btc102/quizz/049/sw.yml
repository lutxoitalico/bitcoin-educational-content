question: Je, ni sifa gani kuu ya DIY (Jifanyie Mwenyewe) Wallet?
answer: Ni suluhisho la chanzo huria 100% ambalo linaweza kuundwa nyumbani ili kupunguza hatari za uaminifu kwa watendaji wengine katika msururu wa uzalishaji au uundaji.
wrong_answers:
  - Ni kifaa cha kuhifadhia bitcoins
  - Ni programu ya bitcoins za Mining
  - Ni jukwaa la kununua na kuuza bitcoins
explanation: |
  Yaliyomo kwenye sura yanaelezea kuwa pochi za DIY (Do It Yourself) ni 100%
  suluhu za chanzo huria ambazo zinaweza kuundwa nyumbani ili kupunguza hatari za uaminifu kuelekea
  wahusika wengine katika msururu wa uzalishaji au uundaji.
