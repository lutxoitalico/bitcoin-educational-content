question: Je, ni hatua gani ya tatu katika kuunda mpango wa urithi kulingana na sura?
answer: Andika barua.
wrong_answers:
  - Fanya hesabu rahisi na ya haraka.
  - Chagua watu wanaofaa kuwasaidia warithi wako.
  - Kuajiri wakili.
explanation: |
  Hatua ya tatu katika kuunda mpango wa urithi, kama inavyopendekezwa katika sura,
  ni kuandika barua.
reviewed: false