question: Inamaanisha nini kusema kwamba Bitcoin ni kama shimo nyeusi?
answer: Haitatoweka na itachukua kila kitu kwenye njia yake kwa wakati.
wrong_answers:
  - Hatimaye itaanguka chini ya uzito wake mwenyewe.
  - Ni tishio kwa mfumo wa fedha duniani.
  - Ni fumbo ambalo wanasayansi bado wanajaribu kuelewa.
explanation: |
  Taarifa kwamba Bitcoin ni kama shimo jeusi inarejelea uthabiti wake
  na uwezo wake wa kuwa mfumo mkuu wa kifedha, unaochukua mifumo mingine yote
  katika njia yake.
