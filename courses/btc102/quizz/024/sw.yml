question: Je, kuna umuhimu gani wa kuwa mnyenyekevu na mwenye busara katika uwekezaji wa Bitcoin?
answer: Kwa kujiweka wazi, unaweza kuwa shabaha inayowezekana, na kuongeza hatari kwako na kwa familia yako.
wrong_answers:
  - Kwa kukaa mnyenyekevu na mwenye busara, unaweza kuepuka kuvutia tahadhari kutoka kwa wawekezaji wengine.
  - Kwa kukaa mnyenyekevu na mwenye busara, unaweza kuepuka kuvutia tahadhari kutoka kwa jumuiya ya Bitcoin.
  - Kwa kukaa mnyenyekevu na mwenye busara, unaweza kuepuka kuvutia usikivu kutoka kwa vyombo vya habari.
explanation: |
  Katika uwekezaji wa Bitcoin, ni muhimu kukaa mnyenyekevu na mwenye busara kwa sababu
  kwa kujiweka wazi, unaweza kuwa shabaha inayowezekana, na kuongeza hatari
  kwa ajili yako na familia yako.
reviewed: false