question: Je, kutobadilika kwa Bitcoin Blockchain kunamaanisha nini?
answer: Haiwezi kubadilishwa kwa wakati
wrong_answers:
  - Haiwezi kudukuliwa
  - Haiwezi kunakiliwa
  - Haiwezi kufutwa
explanation: |
  Kutobadilika kwa Bitcoin Blockchain ina maana kwamba mara moja shughuli
  imerekodiwa, haiwezi kubadilishwa au kufutwa. Hii inahakikisha uadilifu na
  kuegemea kwa Blockchain.
reviewed: false