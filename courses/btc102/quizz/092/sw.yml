question: Je! ni sababu gani ya msingi ya Bitcoiner mbishi atatumia nodi yake ya LN?
answer: Ili kudumisha faragha na usalama
wrong_answers:
  - Ili kuepuka michakato ya KYC
  - Kusimamia UTXOs zao
  - Ili kuchanganya sarafu zao
explanation: |
  Sura hiyo inataja kwamba Bitcoiner mwenye paranoid angetumia LN yao wenyewe
  nodi kama sehemu ya kuzingatia usalama. Wakati wa kuzuia michakato ya KYC, kudhibiti
  UTXOs, na kuchanganya sarafu pia ni shughuli ambazo Bitcoiner mwenye mshangao anaweza kushiriki,
  haya hayahusiani moja kwa moja na matumizi ya nodi ya LN.
reviewed: false