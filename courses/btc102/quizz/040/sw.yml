question: Je, ni faida gani kuu ya Bitcoin juu ya akaunti za kawaida za benki?
answer: Udhibiti kamili juu ya pesa zako
wrong_answers:
  - Viwango vya juu vya riba
  - Ada za chini za muamala
  - Nyakati za ununuzi wa haraka
explanation: |
  Sura hiyo inaeleza kuwa Bitcoin inatoa njia mbadala yenye nguvu ya
  jadi
  mifumo ya kifedha. Inaruhusu kila mtu kuhifadhi faragha yake, kulinda dhidi ya
  mfumuko wa bei na kushuka kwa thamani ya sarafu, kupita tawala za kimabavu, na kurejesha mamlaka
  juu ya pesa zao.
