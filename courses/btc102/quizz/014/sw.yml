question: Ni nini kusudi kuu la kutumia zana kama Signal, Tor, na ProtonMail?
answer: Ili kuthamini na kulinda faragha yako
wrong_answers:
  - Ili kuharakisha muunganisho wako wa intaneti
  - Ili kulinda kompyuta yako kutoka kwa virusi
  - Ili kutoa ufikiaji wa bure kwa huduma za malipo
explanation: |
  Zana kama vile Signal, Tor, na ProtonMail hutumika kuthamini na kulinda
  faragha yako. Ni sehemu ya hatua za kuboresha tabia za usalama mtandaoni.'
