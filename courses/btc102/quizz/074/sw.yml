question: Je, lengo kuu la staka ya Bitcoin ni nini?
answer: Ili kukusanya satoshi nyingi iwezekanavyo
wrong_answers:
  - Kukusanya bitcoins nyingi iwezekanavyo
  - Kuuza bidhaa au huduma katika Bitcoin
  - Ili kununua Bitcoin moja kwa moja kwa pesa taslimu na marafiki au wanachama wa jumuiya ya Bitcoin
explanation: |
  Lengo kuu la stacker ya Bitcoin ni kukusanya satoshi nyingi
  iwezekanavyo. Hili linaafikiwa kwa kuweka mpango wa Wastani wa Gharama ya Dola (DCA) na
  kutafuta suluhu zingine za kukusanya satoshi.
reviewed: false