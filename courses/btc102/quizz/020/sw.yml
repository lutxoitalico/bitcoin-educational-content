question: Je, kanuni ya dhahabu ya kuwekeza ni ipi?
answer: Kamwe usiwekeze zaidi ya unaweza kumudu kupoteza.
wrong_answers:
  - Daima wekeza katika kile ambacho ni mtindo.
  - Wekeza kila wakati kwa pesa zilizokopwa.
  - Siku zote wekeza kwenye usichokielewa.
explanation: |
  Kanuni ya dhahabu ya kuwekeza ni kamwe kuwekeza zaidi kuliko unaweza kumudu
  kupoteza. Hii ni kwa sababu uwekezaji daima hubeba kiwango fulani cha hatari, na wewe
  unapaswa kuwekeza pesa tu ambazo unaweza kumudu kupoteza bila kuathiri kifedha yako
  utulivu.
