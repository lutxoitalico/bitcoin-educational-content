question: Je, maneno Si funguo yako, si Bitcoins yako kusisitiza nini?
answer: Umuhimu wa kumiliki ufunguo wa kibinafsi kwa Bitcoin Wallet
wrong_answers:
  - Umuhimu wa kuwa na ufunguo wa kimwili kufikia Bitcoins zako
  - Umuhimu wa kuweka Bitcoins zako mahali salama
  - Umuhimu wa kutoshiriki maelezo ya akaunti yako ya Bitcoin
explanation: |
  Sura hiyo inaeleza kuwa maneno Sio funguo zako, sio Bitcoins zako
  inasisitiza umuhimu wa kumiliki ufunguo wa kibinafsi wa Bitcoin Wallet. Kwa kumiliki
  ufunguo wa kibinafsi, una udhibiti kamili juu ya Bitcoins iliyomo.
reviewed: false