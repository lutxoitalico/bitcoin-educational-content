question: Bitcoin ni nini kulingana na harakati ya cyberpunk?
answer: Sawa ya kielektroniki ya pesa taslimu
wrong_answers:
  - Aina ya dhahabu ya dijiti
  - Aina mpya ya kadi ya mkopo
  - Aina ya cryptocurrency
explanation: |
  Sura hiyo inataja kwamba kutoka kwa mtazamo wa Cyberpunk, Bitcoin inapinga
  jamii isiyo na pesa. Inaruhusu kuunda faragha kamili na bila mpatanishi
  shughuli za kifedha za kidijitali. Kwa harakati ya cyberpunk, Bitcoin ni ya kielektroniki
  sawa na pesa taslimu.
reviewed: false