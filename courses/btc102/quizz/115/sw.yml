question: Madhumuni ya kidhibiti nenosiri katika Bitcoin ni nini?
answer: Ili kuhifadhi na kudhibiti kwa usalama manenosiri ya miamala ya Bitcoin.
wrong_answers:
  - Ili kuchimba Bitcoins mpya.
  - Kufanya biashara ya Bitcoins.
  - Kubadilisha Bitcoins kuwa cryptocurrensets nyingine.
explanation: |
  Kidhibiti cha nenosiri ni programu tumizi inayotumika kuhifadhi na
  dhibiti manenosiri ya mtu kwa akaunti mbalimbali mtandaoni. Katika muktadha wa Bitcoin,
  inatumika kuhifadhi na kudhibiti nywila kwa usalama kwa shughuli za Bitcoin.
