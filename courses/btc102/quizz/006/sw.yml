question: Ni kashfa gani ya kawaida katika uwanja wa uwekezaji wa kifedha?
answer: Mifumo ya kuuza piramidi.
wrong_answers:
  - Kuuza bidhaa za kimwili.
  - Uuzaji wa bidhaa za programu.
  - Kuuza fedha za fiat.
explanation: |
  Katika uwanja wa uwekezaji wa kifedha, mifumo ya kuuza piramidi na Ponzi
  miradi inajitokeza kama mifano haramu. Wanafanya kazi kwa kutumia pesa za wawekezaji wapya
  kuwalipa washiriki wazee.
