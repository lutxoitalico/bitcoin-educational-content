question: Madhumuni ya uthibitishaji wa sababu mbili (2FA) katika Bitcoin ni nini?
answer: Ili kuimarisha usalama wa miamala ya Bitcoin.
wrong_answers:
  - Ili kuchimba Bitcoins mpya.
  - Kufanya biashara ya Bitcoins.
  - Kubadilisha Bitcoins kuwa cryptocurrensets nyingine.
explanation: |
  Uthibitishaji wa vipengele viwili (2FA) ni njia ya kuthibitisha madai ya mtumiaji
  utambulisho kwa kutumia kitu wanachokijua (nenosiri) na jambo la pili isipokuwa
  kitu walichonacho au kitu walicho. Inatumika kuimarisha usalama wa
  Bitcoin shughuli.
reviewed: false