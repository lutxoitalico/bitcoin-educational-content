question: Madhumuni ya pochi za Bitcoin ni nini?
answer: Kutuma na kupokea bitcoins
wrong_answers:
  - Ili kuchimba bitcoins
  - Ili kuhifadhi bitcoins za kimwili
  - Kubadilisha bitcoins kuwa sarafu zingine
explanation: |
  Pochi za Bitcoin hutumiwa kutuma na kupokea bitcoins. Wao ni digital
  pochi ambazo huhifadhi kitambulisho cha dijitali muhimu ili kufikia Bitcoin Address
  na kutumia bitcoins.
reviewed: false