question: Je, ni jukumu gani kuu la wachimbaji madini katika mtandao wa Bitcoin?
answer: Wanalinda mtandao kwa kutekeleza michakato ya Bitcoin ya Proof-of-Work
wrong_answers:
  - Wanaunda bitcoins mpya
  - Wanadhibiti bei ya Bitcoin
  - Wanadhibiti mtandao wa Bitcoin
explanation: |
  Yaliyomo kwenye sura yanaeleza kuwa wachimbaji wana jukumu la kupata
  mtandao wa Bitcoin. Wanatumia umeme kutekeleza michakato ya Bitcoin ya Proof-of-Work,
  ambayo inaunda kizuizi kipya.
reviewed: false