question: FOMO ni nini katika muktadha wa uwekezaji wa Bitcoin?
answer: Hofu ya Kukosa, ambayo inaweza kusababisha uwekezaji wa haraka.
wrong_answers:
  - Hofu ya Kutoa Ofa, ambayo inaweza kusababisha kusitasita katika kuwekeza.
  - Hofu ya Oscillations ya Soko, ambayo inaweza kusababisha wasiwasi juu ya tete ya soko.
  - Hofu ya Kuongezeka kwa Fedha, ambayo inaweza kusababisha uwekezaji kupita kiasi.
explanation: |
  Katika muktadha wa uwekezaji wa Bitcoin, FOMO inasimamia Hofu ya Kukosa
  Nje. Hii inaweza kusababisha uwekezaji wa haraka kwani wawekezaji hukimbilia kununua Bitcoin nje
  hofu ya kukosa faida inayoweza kutokea.
