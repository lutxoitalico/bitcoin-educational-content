question: Cold Wallet ni nini katika muktadha wa Bitcoin?
answer: Wallet ya kuhifadhi kiasi kikubwa cha Bitcoin nje ya mtandao
wrong_answers:
  - Wallet ambayo inatumika kwa shughuli katika hali ya hewa ya Cold
  - Wallet ambayo hutumika kuhifadhi kiasi kidogo cha Bitcoin
  - Wallet ambayo hutumika kuhifadhi Bitcoin kwa muda mfupi
explanation: |
  Cold Wallet ni Wallet ya kuhifadhi kiasi kikubwa cha Bitcoin nje ya mtandao.
  Inachukuliwa kuwa salama zaidi kuliko Hot Wallet kwani haiathiriwi sana na udukuzi.
