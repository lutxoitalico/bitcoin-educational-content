question: UTXO ni nini katika muktadha wa Bitcoin?
answer: Pato la Muamala Usilotumika
wrong_answers:
  - Pato la Muamala Lisilotambulika
  - Pato la Muamala Lisiloweza kufuatiliwa
  - Pato la Muamala Lisilothibitishwa
explanation: |
  Katika muktadha wa Bitcoin, UTXO inawakilisha Pato la Muamala Usiotumika.
  Hili ni neno linalotumiwa kuelezea matokeo ya shughuli ambayo mtumiaji anaweza kutumia.
reviewed: false