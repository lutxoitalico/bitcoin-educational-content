question: Hot Wallet inatumika kwa nini katika muktadha wa Bitcoin?
answer: Kutuma na kupokea bitcoins mara kwa mara kwa matumizi ya kila siku.
wrong_answers:
  - Ili kuhifadhi bitcoins kwa usalama kwa muda mrefu.
  - Ili kuchimba bitcoins mpya.
  - Kufanya biashara ya bitcoins kwenye jukwaa la Exchange.
explanation: |
  Hot Wallet ni aina ya Bitcoin Wallet ambayo imeunganishwa kwenye mtandao,
  kuifanya kufaa kwa shughuli za kila siku. Hata hivyo, ni hatari zaidi kwa hacking
  na wizi kuliko Cold Wallet.
reviewed: false