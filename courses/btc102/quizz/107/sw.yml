question: Unapaswa kufanya nini baada ya kuandika barua kulingana na sura?
answer: Kagua kazi yako, tengeneza nakala ya barua, weka nakala zote mbili kwenye bahasha, Seal, tia sahihi Seal, na uhifadhi bahasha hii mahali salama lakini panapoweza kufikiwa.
wrong_answers:
