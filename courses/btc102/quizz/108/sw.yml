question: Unapaswa kufanya nini baada ya kuhifadhi bahasha kulingana na sura?
answer: Hakikisha warithi wako wanajua kwamba wanahitaji kurejesha bahasha hii ikiwa ni lazima.
wrong_answers:
  - Hakikisha warithi wako hawajui kwamba wanahitaji kuepua bahasha hii ikihitajika.
  - Hakikisha warithi wako wanajua kuwa hawahitaji kurudisha bahasha hii ikihitajika.
  - Hakikisha warithi wako hawajui kuwa hawahitaji kurudisha bahasha hii
explanation: |
  Baada ya kuhifadhi bahasha, unapaswa kuhakikisha kwamba warithi wako wanajua hilo
  wanahitaji kuchukua bahasha hii ikiwa ni lazima, kama inavyopendekezwa katika sura.
