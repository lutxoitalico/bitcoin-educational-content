question: Je, ni mawazo gani ya Bitcoiner mwenye paranoid linapokuja suala la kutumia Bitcoin?
answer: Tahadhari, usalama, na kutokujulikana ni muhimu
wrong_answers:
  - Uaminifu, uwazi, na uwazi ni muhimu
  - Kuchukua hatari, uaminifu, na uwazi ni muhimu
  - Ujinga, uaminifu, na uwazi ni muhimu
explanation: |
  Sura hiyo inaelezea mawazo ya Bitcoiner ya paranoid kama moja ambapo
  tahadhari, usalama, na kutokujulikana ni muhimu.
