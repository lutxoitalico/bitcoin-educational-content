question: Ni nini lengo kuu la maamuzi ya uwekezaji ya Bitcoin?
answer: Kukusanya satoshi nyingi iwezekanavyo
wrong_answers:
  - Harakati za bei za muda mfupi
  - Kuuza bidhaa au huduma katika Bitcoin
  - Kununua kiasi kikubwa cha Bitcoin mara moja
explanation: |
  Lengo kuu la maamuzi ya uwekezaji wa staka ya Bitcoin ni kukusanya
  satoshi nyingi iwezekanavyo. Hii inafanikiwa kwa kuweka Wastani wa Gharama ya Dola
  (DCA) panga na kutafuta suluhu zingine za kukusanya satoshi.
