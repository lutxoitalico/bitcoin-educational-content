question: Je, ni sehemu gani ngumu zaidi ya kuwa Hodler kulingana na sura?
answer: Bila kufanya chochote na kushikilia Bitcoin.
wrong_answers:
  - Kununua Bitcoin.
  - Kuweka Cold Wallet.
  - Kuweka mpango wa urithi.
explanation: |
  Sura inataja kuwa sehemu ngumu zaidi ya kuwa Hodler ni kufanya
  hakuna kitu, yaani, kupinga jaribu la kuuza na kushikilia Bitcoin kwa
  muda mrefu.
reviewed: false