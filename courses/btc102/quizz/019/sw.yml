question: Ni hatari gani inayohusishwa na kuhifadhi Bitcoins kwenye jukwaa la Exchange?
answer: Jukwaa linaweza kufilisika, Bitcoins zako zinaweza kutwaliwa, au jukwaa linaweza kudukuliwa.
wrong_answers:
  - Jukwaa linaweza kuongeza ada zake, Bitcoins zako zinaweza kupoteza thamani, au jukwaa linaweza kudukuliwa.
  - Jukwaa linaweza kufilisika, Bitcoins zako zinaweza kuongezeka kwa thamani, au jukwaa linaweza kudukuliwa.
  - Jukwaa linaweza kufilisika, Bitcoins zako zinaweza kuchukuliwa, au jukwaa linaweza kuongeza ada zake.
explanation: |
  Kuhifadhi Bitcoins kwenye jukwaa la Exchange hubeba hatari kama vile jukwaa
  kufilisika, kutaifishwa kwa Bitcoins zako, au udukuzi wa jukwaa.
  Hii ndiyo sababu ni muhimu kuwa na udhibiti wa ufunguo wako wa faragha.
reviewed: false