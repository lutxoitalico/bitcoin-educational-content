question: Je, madhumuni ya msingi ya Cold Wallet ni nini kwa mtumiaji wa mara kwa mara wa Bitcoin?
answer: Ili kuhifadhi bitcoins kwa usalama kwa muda mrefu.
wrong_answers:
  - Kutuma na kupokea bitcoins mara kwa mara kwa matumizi ya kila siku.
  - Kufanya biashara ya bitcoins kwenye jukwaa la Exchange.
  - Ili kuchimba bitcoins mpya.
explanation: |
  Cold Wallet ni aina ya Bitcoin Wallet ambayo haijaunganishwa na
  mtandao, na kuifanya iwe rahisi kuathiriwa na udukuzi na wizi. Kawaida hutumiwa kwa
  kuhifadhi bitcoins ambazo hazihitajiki kwa shughuli za kila siku.
reviewed: false