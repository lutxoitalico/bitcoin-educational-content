question: Je, ni hatua gani ya kwanza katika kuunda mpango wa urithi kulingana na sura?
answer: Chagua watu wanaofaa kuwasaidia warithi wako.
wrong_answers:
  - Andika barua.
  - Fanya hesabu rahisi na ya haraka.
  - Kuajiri wakili.
explanation: |
  Hatua ya kwanza katika kuunda mpango wa urithi, kama inavyopendekezwa katika sura,
  ni kuchagua watu wanaofaa kuwasaidia warithi wako.
reviewed: false