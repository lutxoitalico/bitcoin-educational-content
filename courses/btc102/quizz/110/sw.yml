question: Uchumi wa Austria ni nini kuhusiana na Bitcoin?
answer: Mawazo ya kiuchumi ambayo yanapinga Uhinesia wa jadi na inaweza kusaidia kuelewa nafasi ya Bitcoin katika uchumi.
wrong_answers:
  - Aina ya uchumi inayotekelezwa nchini Austria.
  - Nadharia ya kiuchumi ambayo Bitcoin inategemea.
  - Tawi la uchumi linalosoma athari za Bitcoin kwa uchumi wa Austria.
explanation: |
  Uchumi wa Austria ni shule ya mawazo ya kiuchumi ambayo inategemea
  kimbinu
  ubinafsi. Imetumiwa na washiriki wengi wa Bitcoin kuelezea uwezo
  manufaa ya sarafu iliyogatuliwa, isiyopungua bei kama vile Bitcoin.
