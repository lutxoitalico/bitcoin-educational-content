question: Je, ni jukumu gani la watu wanaoaminika katika mpango wako wa urithi?
answer: Ili kusaidia familia yako wakati haupo tena kwa kutoa ushauri kuhusu ufunguo na usimamizi wa Wallet, kusaidia kuelewa jinsi ya kurejesha misemo yako ya siri (mbegu), na kutoa uhakikisho wakati wa ununuzi.
wrong_answers:
  - Kumiliki mali yako ya crypto baada ya kifo chako, kudhibiti mali yako, na kusambaza mali yako kati ya warithi wako.
  - Kuiba mali zako za crypto kabla hazijakabidhiwa kwa wapendwa wako, kuhatarisha miamala yako, na kuunda migogoro kati ya warithi wako.
  - Kupuuza familia yako wakati haupo tena, kutoa ushauri wa kupotosha kuhusu ufunguo na usimamizi wa Wallet, na kuleta mkanganyiko wakati wa muamala.
explanation: |
  Watu wanaoaminika katika mpango wako wa urithi wako kukusaidia
  familia yako wakati haupo tena. Wanatoa ushauri juu ya ufunguo na usimamizi wa Wallet,
  kusaidia kuelewa jinsi ya kurejesha misemo yako ya siri (mbegu), na kutoa uhakikisho
  wakati wa shughuli.
reviewed: false