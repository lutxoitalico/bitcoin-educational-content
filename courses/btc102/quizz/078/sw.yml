question: Hot Wallet ni nini katika muktadha wa Bitcoin?
answer: Wallet ya dijitali inayotumika kuhifadhi, kutuma na kupokea Bitcoin
wrong_answers:
  - Wallet halisi inayotumika kuhifadhi Bitcoin
  - Njia ya kununua Bitcoin
  - Jukwaa la Bitcoin Exchange
explanation: |
  Katika muktadha wa Bitcoin, Hot Wallet ni Wallet ya dijiti inayotumika kwa
  kuhifadhi, kutuma na kupokea Bitcoin. Kwa kawaida imeunganishwa kwenye mtandao
  na kwa hiyo ni salama kidogo kuliko Cold Wallet.
reviewed: false