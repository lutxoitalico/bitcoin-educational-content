question: Je! ni sifa gani moja ya mtumiaji wa Bitcoin ambaye ni pragmatic na kujitolea?
answer: Wanajishughulisha kikamilifu na mfumo ikolojia na kuuunga mkono kikamilifu kupitia matumizi ya mara kwa mara.
wrong_answers:
  - Wanatumia Bitcoin mara kwa mara.
  - Wanatumia Bitcoin pekee kwa uwekezaji wa muda mrefu.
  - Wanatumia Bitcoin pekee kwenye jukwaa moja la Exchange.
explanation: |
  Watumiaji wa Bitcoin wa kivitendo na waliojitolea wanashiriki kikamilifu katika Bitcoin
  mfumo wa ikolojia na kuusaidia kupitia matumizi ya mara kwa mara.
