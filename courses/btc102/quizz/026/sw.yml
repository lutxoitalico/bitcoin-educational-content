question: Je, ni sifa gani mbili zinazoifanya Bitcoin kuwa kama ilivyo leo?
answer: Nambari yake ya chanzo-wazi na uhaba wake
wrong_answers:
  - Kutokujulikana kwake na ugatuaji wake wa madaraka
  - Thamani yake ya juu na tete yake
  - Urahisi wa matumizi na kukubalika kwake kimataifa
explanation: |
  Sifa mbili kuu zinazofafanua Bitcoin ni chanzo chake wazi
  kanuni, inayoifanya iwe wazi, iweze kukaguliwa, na iweze kutumiwa na mtu yeyote, na uhaba wake,
  ambayo inamaanisha kutakuwa na bitcoins milioni 21 tu ulimwenguni.
