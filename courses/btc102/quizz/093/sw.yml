question: Ni sifa gani tofauti ya Bitcoiner ya paranoid?
answer: Kutoaminika kwa mifumo ya kati na michakato ya KYC
wrong_answers:
  - Imani katika mifumo ya kati
  - Upendeleo wa kushiriki habari za kibinafsi
  - Ukosefu wa maslahi katika faragha na usalama
explanation: |
  Sura hiyo inaelezea Bitcoiner mbishi kama mtu ambaye ana tofauti
  kutokuwa na imani kwa mifumo ya kati na michakato ya KYC.
