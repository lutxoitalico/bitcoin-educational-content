question: Je, DCA inasimamia nini katika muktadha wa uwekezaji wa Bitcoin?
answer: Wastani wa Gharama ya Dola
wrong_answers:
  - Upataji wa Sarafu ya Moja kwa Moja
  - Ugawaji wa Sarafu ya Dijiti
  - Mali ya Crypto Iliyogatuliwa
explanation: |
  Wastani wa Gharama ya Dola (DCA) ni mkakati ambapo unagawanya jumla
  kiasi unachotaka kuwekeza katika ununuzi wa mara kwa mara ili kupunguza athari za tete.
reviewed: false