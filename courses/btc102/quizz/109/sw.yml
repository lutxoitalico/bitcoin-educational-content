question: Lightning Network ni nini katika muktadha wa Bitcoin?
answer: Teknolojia ya pili ya Layer ambayo huleta maono mapya kabisa ya Bitcoin ni nini.
wrong_answers:
  - Mtandao wa wachimbaji madini wa Bitcoin.
  - Aina mpya ya Bitcoin.
  - Jukwaa la biashara la Bitcoin.
explanation: |
  Lightning Network ni itifaki ya malipo ya Layer 2 inayofanya kazi
  juu ya cryptocurrency yenye Blockchain (kama Bitcoin). Imeundwa ili kuwezesha
  shughuli za haraka kati ya nodi zinazoshiriki.
