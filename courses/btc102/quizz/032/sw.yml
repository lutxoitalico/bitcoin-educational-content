question: Je, kuna umuhimu gani wa Bitcoin kuwa uvumbuzi wa 0 hadi 1?
answer: Inavuruga kanuni na tabia zetu
wrong_answers:
  - Ni sarafu ya kwanza ya kidijitali
  - Thamani imeongezeka kutoka 0 hadi 1
  - Ni hatua ya kwanza kuelekea jamii isiyo na pesa
explanation: |
  Neno 0 hadi 1 linarejelea uvumbuzi mkubwa unaotatiza uliopo
  kanuni na mazoea. Bitcoin inachukuliwa kuwa uvumbuzi kama huo kwa sababu ya sifa zake za kipekee
  na athari zinazowezekana kwa jamii.
