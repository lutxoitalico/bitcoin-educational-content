question: Satoshi ni nini katika muktadha wa Bitcoin?
answer: Sehemu ndogo zaidi ya Bitcoin
wrong_answers:
  - Aina ya Bitcoin Wallet
  - Njia ya kununua Bitcoin
  - Jukwaa la Bitcoin Exchange
explanation: |
  Katika muktadha wa Bitcoin, Satoshi (au SAT) ndio kitengo kidogo zaidi cha
  Bitcoin. Bitcoin stackers inalenga kukusanya satoshi nyingi iwezekanavyo.
