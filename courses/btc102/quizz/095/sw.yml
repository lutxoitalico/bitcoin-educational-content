question: Je! ni baadhi ya sifa za Bitcoiner ya paranoid?
answer: Kukesha, uhuru, kutoaminiana, maarifa, na pragmatism
wrong_answers:
  - Uaminifu, utegemezi, ujinga, na kutowezekana
  - Uvivu, utegemezi, uaminifu, na ujinga
  - Uaminifu, utegemezi, ukosefu wa maarifa, na kutowezekana
explanation: |
  Sura hiyo inaelezea Bitcoiner mwenye paranoid kama mtu ambaye yuko macho,
  kujitegemea, kutokuwa na imani, maarifa, na pragmatic.
