question: Je, ni suluhisho gani lisilo la KYC katika muktadha wa Bitcoin?
answer: Suluhisho linaloruhusu shughuli za Bitcoin zisizojulikana
wrong_answers:
  - Suluhisho linaloruhusu shughuli za Bitcoin bila mtandao
  - Suluhisho linaloruhusu shughuli za Bitcoin bila Wallet
  - Suluhisho linaloruhusu shughuli za Bitcoin bila ada
explanation: |
  Suluhisho lisilo la KYC (Mjue Mteja Wako) ni suluhisho linaloruhusu
  shughuli za Bitcoin zisizojulikana. Haihitaji mtumiaji kutoa kibinafsi
  habari ya kitambulisho.
reviewed: false