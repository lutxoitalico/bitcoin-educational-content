question: Je, kazi kuu ya kidhibiti nenosiri ni nini?
answer: Ili kuhifadhi na kudhibiti manenosiri yako
wrong_answers:
  - Kwa generate nywila nasibu
  - Ili kukumbuka majina yako ya watumiaji
  - Ili kulinda kompyuta yako kutoka kwa virusi
explanation: |
  Kidhibiti cha nenosiri ni programu inayohifadhi na kudhibiti manenosiri yako.
  Inakusaidia usiwahi kutumia nenosiri sawa mara mbili, kuchagua nywila ngumu na salama,
  na kuwezesha usimamizi wako wa usalama mtandaoni.'
