question: Je, kanuni ya dhahabu ya uwekezaji wa Bitcoin ni ipi?
answer: Sio ufunguo wako, sio Bitcoins zako.
wrong_answers:
  - Kamwe usiwekeze zaidi ya unaweza kumudu kupoteza.
  - Epuka kile ambacho ni mtindo.
  - Kupanga na kuwa na maono ya muda mrefu ni muhimu kwa mafanikio katika fedha.
explanation: |
  Kanuni ya dhahabu ya uwekezaji wa Bitcoin sio ufunguo wako, sio Bitcoins zako.
  Hii inamaanisha kuwa ikiwa huna udhibiti wa ufunguo wako wa faragha, huna udhibiti wa kweli
  kumiliki Bitcoins yako.
