question: Je, DCA inasimamia nini katika muktadha wa Bitcoin?
answer: Wastani wa Gharama ya Dola
wrong_answers:
  - Chama cha Sarafu ya Dijiti
  - Ufikiaji wa Pesa moja kwa moja
  - Mali ya Crypto Iliyogatuliwa
explanation: |
  Katika muktadha wa Bitcoin, DCA inawakilisha Wastani wa Gharama ya Dola. Hii
  ni mkakati ambapo mwekezaji anagawanya jumla ya kiasi kitakachowekezwa kote
  ununuzi wa mara kwa mara ili kupunguza athari za tete kwenye ununuzi wa jumla.
reviewed: false