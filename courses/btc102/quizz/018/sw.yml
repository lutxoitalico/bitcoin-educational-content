question: Kuna tofauti gani kati ya biashara, kuwekeza, na kushikilia katika muktadha wa Bitcoin?
answer: Biashara inahusisha mikataba ya muda mfupi yenye hatari kubwa, uwekezaji unahusisha kununua BTC kwa muda mfupi hadi wa kati na hatari ndogo, na kushikilia kunahusisha kuweka BTC kwa muda mrefu sana na hatari ndogo.
wrong_answers:
  - Biashara inahusisha kununua BTC kwa muda mrefu, uwekezaji unahusisha mikataba ya muda mfupi yenye hatari kubwa, na kushikilia kunahusisha kuweka BTC kwa muda mfupi hadi wa kati na hatari ndogo.
  - Biashara inahusisha kununua BTC kwa muda mfupi hadi wa kati, uwekezaji unahusisha mikataba ya muda mfupi yenye hatari kubwa, na kushikilia kunahusisha kuweka BTC kwa muda mrefu sana na hatari kubwa.
  - Biashara inahusisha kununua BTC kwa muda mfupi hadi wa kati, uwekezaji unahusisha mikataba ya muda mfupi yenye hatari kubwa, na kushikilia kunahusisha kuweka BTC kwa muda mrefu sana na hatari ndogo.
explanation: |
  Biashara, uwekezaji, na kushikilia ni mikakati mitatu tofauti inayotumika katika
  soko la Bitcoin. Biashara inahusisha mikataba ya muda mfupi na hatari kubwa, uwekezaji
  inahusisha kununua BTC kwa muda mfupi hadi wa kati na hatari ndogo, na kushikilia kunahusisha
  kuweka BTC kwa muda mrefu sana na hatari ndogo.
