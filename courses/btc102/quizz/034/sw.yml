question: Ni kikomo gani cha bitcoins ambacho kitawahi kuwa?
answer: milioni 21
wrong_answers:
  - milioni 100
  - bilioni 1
  - Hakuna kikomo
explanation: |
  Sura hiyo inasema kuwa hakutakuwa na bitcoins zaidi ya milioni 21.
  Kikomo hiki kilianzishwa katika itifaki ya Bitcoin na Satoshi na haiwezi kubadilishwa
  leo.
reviewed: false