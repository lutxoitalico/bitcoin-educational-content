question: Kuna hatari gani ya kutomiliki ufunguo wa faragha wa Bitcoin Wallet yako?
answer: Bitcoin zako ziko chini ya hatari kama vile udukuzi, kunaswa, udhibiti au kufilisika
wrong_answers:
  - Bitcoins zako zitabadilishwa kiotomatiki hadi cryptocurrency nyingine
  - Bitcoins zako zitapoteza thamani yao
  - Bitcoins zako zitahamishiwa kwenye Wallet nyingine
explanation: |
  Ikiwa humiliki ufunguo wa faragha wa Bitcoin Wallet yako, bitcoins zako
  wako chini ya hatari kama vile udukuzi, ukamataji, udhibiti, au kufilisika.
reviewed: false