question: Ni ipi mojawapo ya hatua za kuweka kompyuta yako katika hali bora ya kufanya kazi?
answer: Hifadhi nakala ya data yako mara kwa mara
wrong_answers:
  - Shiriki manenosiri yako
  - Tumia nenosiri sawa kwa akaunti zote
  - Puuza kusasisha kompyuta yako
explanation: |
  Kucheleza data yako mara kwa mara ni mojawapo ya hatua za kuweka kompyuta yako
  katika hali bora ya kufanya kazi. Pia ni hatua ya msingi ya kuboresha usalama mtandaoni
  mazoea.'
reviewed: false