question: Je! ni jukumu gani la Hot LN Wallet kwa Hodler ambaye anataka kwenda mbali zaidi?
answer: Kwa kutumia baadhi ya Bitcoin.
wrong_answers:
  - Kwa kununua zaidi Bitcoin.
  - Kwa kuhifadhi Bitcoin zao zote.
  - Kwa biashara ya Bitcoin.
explanation: |
  Hodler ambaye anataka kwenda mbali zaidi anaweza kutumia Hot LN Wallet kwa matumizi
  baadhi ya Bitcoin, pamoja na kuishikilia kwa muda mrefu.
reviewed: false