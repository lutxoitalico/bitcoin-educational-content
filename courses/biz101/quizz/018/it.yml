question: Qual è uno dei motivi per cui gli investitori istituzionali e le grandi aziende si sono interessati a Bitcoin?
answer: L'adozione di Bitcoin da parte di importanti operatori finanziari, come BlackRock, e il successo degli ETF Spot su bitcoin, lo hanno legittimato come bene rifugio.
wrong_answers:
  - Il prezzo dei bitcoin è fissato e garantito da agenzie governative.
  - Le transazioni in Bitcoin sono completamente assicurate dalle banche centrali.
  - Non richiede alcuna conoscenza degli asset digitali o delle normative finanziarie.
explanation: |
  Quando le principali istituzioni riconoscono i bitcoin come un investimento valido, segnalano al mercato che è maturato al di là della speculazione. Prodotti come gli ETF Spot in bitcoin facilitano l'esposizione delle imprese, favorendo ulteriormente l'accettazione da parte del mercato.
reviewed: false
