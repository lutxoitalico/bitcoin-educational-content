question: Qual è il requisito hardware principale di un profilo Starter per accettare pagamenti in bitcoin?
answer: Uno smartphone
wrong_answers:
  - Un miner ASIC di Bitcoin
  - Un portafoglio hardware
  - Un server self-hosted
explanation: |
  Il profilo Starter richiede solo uno smartphone o un tablet con un portafoglio Lightning, il che lo rende una soluzione leggera.
reviewed: false
