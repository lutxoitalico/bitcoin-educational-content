question: Quale dei seguenti NON è uno dei tre metodi principali menzionati per l'acquisizione dei bitcoin?
answer: Ricevere dei bitcoin come sovvenzione governativa per lo sviluppo delle imprese.
wrong_answers:
  - Ottenere dei bitcoin in cambio di beni o servizi.
  - L'estrazione dei bitcoin richiede hardware specializzato e consumo di energia.
  - Acquistare dei bitcoin da una piattaforma o da un broker.
explanation: |
  Il capitolo menziona tre modi principali per acquisire dei bitcoin: accettarlo come pagamento, estrarlo o acquistarlo. Ricevere dei bitcoin come sovvenzione governativa non è un metodo di acquisizione standard riconosciuto.

