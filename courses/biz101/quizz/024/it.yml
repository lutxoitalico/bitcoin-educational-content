question: Quando si acquistano dei bitcoin, qual è l'approccio consigliato per gestire la volatilità del prezzo?
answer: Accumulare gradualmente dei bitcoin a intervalli regolari e mantenere una prospettiva a lungo termine.
wrong_answers:
  - Cercare di prevedere i picchi di mercato a breve termine e vendere immediatamente.
  - Andare all-in con l'intera tesoreria dell'azienda in una sola volta.
  - Acquistate dei bitcoin solo nei giorni in cui il suo prezzo è salito bruscamente.
explanation: |
  Gli acquisti regolari nel tempo (dollar-cost averaging - DCA) contribuiscono ad attenuare la volatilità. Un orizzonte temporale più lungo (ad esempio, 4 anni) riduce l'impatto delle oscillazioni di prezzo a breve termine.
