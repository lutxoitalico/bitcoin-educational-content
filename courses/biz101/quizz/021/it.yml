question: Perché un'azienda potrebbe prendere in considerazione la possibilità di detenere dei bitcoin piuttosto che asset tradizionali "sicuri" come gli immobili?
answer: I bitcoin possono potenzialmente superare l'inflazione reale e non sono legati all'illiquidità e ai costi di manutenzione degli immobili.
wrong_answers:
  - Gli immobili sono sempre più economici dei bitcoin e non hanno mai bisogno di manutenzione.
  - I bitcoin offrono garanzie sostenute da un governo che gli immobili non offrono.
  - Gli immobili si apprezzano più rapidamente dei bitcoin in tutte le condizioni di mercato.
explanation: |
  Gli immobili spesso comportano vincoli di liquidità e costi continui e potrebbero non tenere il passo con l'inflazione nascosta in un sistema monetario basato sul debito. La scarsità e la portata globale dei bitcoin offrono una proposta di riserva di valore distinta, che nel lungo periodo potrebbe superare gli asset tradizionali.
reviewed: false
