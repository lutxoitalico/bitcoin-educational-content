question: Ni tofauti gani kuu kati ya maadili ya kifalsafa na maadili ya kiuchumi kulingana na Bastiat?
answer: Moja inashughulikia moyo, nyingine akili
wrong_answers:
  - Mmoja ni mtu binafsi, mwingine ni wa pamoja
  - Moja ni ya zamani, nyingine ni ya kisasa
  - Mmoja ni wa kidini, mwingine ni wa kidunia
explanation: |
  Maadili ya kifalsafa huvutia hisia na wema wa kibinafsi, wakati maadili ya kiuchumi yanalenga kuelimisha kwa busara kwa kuonyesha matokeo ya vitendo.
reviewed: false