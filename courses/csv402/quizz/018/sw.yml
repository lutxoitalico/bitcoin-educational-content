question: Ni shughuli gani zinazofafanua mabadiliko ya Smart contract katika RGB?
answer: State Transition, Genesis, na State Extension
wrong_answers:
  - Uumbaji wa Seal, Maadhimisho ya Contract, na Uthibitishaji wa Mwisho
  - Uhamisho wa UTXO, Uzalishaji wa Uthibitisho, na Hash Commitment
  - Vifurushi vya Mpito, Mihuri ya matumizi Moja, na Uundaji wa Valency
explanation: |
  Operesheni hizi huunda au kurekebisha hali ya Contract, huku kikihakikisha uhalali wake kupitia nanga za Bitcoin.
