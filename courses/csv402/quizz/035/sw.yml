question: Ninawezaje kusakinisha zana ya RGB kupitia Cargo?
answer: cargo installs RGB-contracts --all-features
wrong_answers:
  - cargo install RGB --features zote
  - kusakinisha mizigo RGB-Bitcoin --yote
  - shehena kujenga RGB-umeme --kutolewa
explanation: |
  Ufungaji unafanywa kwa amri ya "cargo installs RGB-contracts --all-features", crate inayoitwa "RGB-contracts", ambayo inasakinisha chombo cha RGB.
reviewed: false