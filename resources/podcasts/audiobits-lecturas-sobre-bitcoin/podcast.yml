description: |
  Lecturas de los mejores artículos sobre Bitcoin al audio en español. Los artículos suelen estar publicados en inglés y me dedico a la traducción y/o narración en la lengua española. 

  He empezado este proyecto dedicado a traducir y narrar una colección de los mejores artículos, que he consumido en estos últimos 5 años del inglés, para hacer accesible este material didáctico al público #hispano sobre un tema tan profundo como disruptivo, muchas veces malentendido, con nexos y paralelismos que van más allá de una mera criptodivisa.
