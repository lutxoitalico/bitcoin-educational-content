description: |
  Alby está capacitando consumidores e desenvolvedores com ferramentas de pagamento em bitcoin fáceis de usar usando a lightning network em todos os lugares: na web, em aplicativos móveis e no mundo real. Com o Alby Hub, os usuários obtêm uma carteira lightning self-custodial poderosa que se conecta facilmente a vários aplicativos. A extensão do navegador Alby permite uma interação suave com sites, facilitando pagamentos e verificação de identidade diretamente no navegador. Para usuários móveis, o Alby Go oferece uma carteira fácil de usar para gerenciar transações em movimento. Além disso, o Alby fornece APIs para integrar pagamentos em bitcoin em qualquer aplicativo e interagir programaticamente com carteiras lightning de bitcoin.
