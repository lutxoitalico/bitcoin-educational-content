description: |
  Alby is empowering consumers and developers with easy-to-use bitcoin payment tools using the lightning network everywhere: on the web in mobile apps and the real world. With Alby Hub, users gain a powerful, self-custodial lightning wallet that connects effortlessly to various apps. The Alby Browser Extension allows for smooth interaction with websites, facilitating payments and identity verification directly within your browser. For mobile users, Alby Go offers a user-friendly wallet to manage transactions on the go. Additionally, Alby provides APIs to integrate bitcoin payments into any app and programmatically interact with bitcoin lightning wallets.