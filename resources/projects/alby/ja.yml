description: |
  Alby は、ウェブ、モバイルアプリ、現実世界のどこでも Lightning ネットワークを使用して簡単にビットコインの支払いツールを提供することで、消費者と開発者に力を与えています。Alby Hub を使えば、ユーザーはさまざまなアプリに簡単に接続できる強力なセルフカストディアル Lightning ウォレットを手に入れることができます。Alby ブラウザ拡張機能は、ウェブサイトとの円滑なやり取りを可能にし、ブラウザ内での支払いと ID 認証を簡単に行えます。モバイルユーザー向けに、Alby Go は外出先での取引管理を容易にするユーザーフレンドリーなウォレットを提供します。さらに、Alby は、ビットコイン支払いを任意のアプリに統合し、プログラム的にビットコイン Lightning ウォレットとやり取りするための API を提供しています。
