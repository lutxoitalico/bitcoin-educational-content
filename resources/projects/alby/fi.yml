description: |
  Alby tarjoaa kuluttajille ja kehittäjille helppokäyttöisiä bitcoin-maksutyökaluja käyttämällä Lightning-verkkoa kaikkialla: verkossa, mobiilisovelluksissa ja todellisessa maailmassa. Alby Hub tarjoaa käyttäjille tehokkaan, itsehallinnollisen Lightning-lompakon, joka yhdistyy vaivattomasti erilaisiin sovelluksiin. Alby-selaimen laajennus mahdollistaa sujuvan vuorovaikutuksen verkkosivustojen kanssa, helpottaa maksuja ja henkilöllisyyden vahvistamista suoraan selaimessa. Mobiilikäyttäjille Alby Go tarjoaa käyttäjäystävällisen lompakon, jonka avulla voi hallita tapahtumia liikkeellä. Lisäksi Alby tarjoaa rajapintoja (API), joiden avulla bitcoin-maksut voidaan integroida mihin tahansa sovellukseen ja ohjelmallisesti käyttää bitcoin Lightning-lompakoita.
