description: |
  Alby gir forbrukere og utviklere brukervennlige bitcoin-betalingsverktøy ved å bruke Lightning-nettverket overalt: på nettet, i mobilapper og i den virkelige verden. Med Alby Hub får brukere en kraftig, selvforvaltet Lightning-lommebok som kobles sømløst til forskjellige apper. Alby-nettleserutvidelsen tillater smidig interaksjon med nettsider, og muliggjør betalinger og identitetsverifisering direkte i nettleseren. For mobilbrukere tilbyr Alby Go en brukervennlig lommebok for å administrere transaksjoner på farten. I tillegg gir Alby API-er for å integrere bitcoin-betalinger i enhver app og programmere interaksjoner med bitcoin Lightning-lommebøker.
