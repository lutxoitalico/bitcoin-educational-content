description: |
  Alby permet aux consommateurs et aux développeurs d'utiliser facilement des outils de paiement en bitcoin via le réseau Lightning, partout : sur le web, dans les applications mobiles et dans le monde réel. Avec Alby Hub, les utilisateurs bénéficient d'un portefeuille Lightning puissant et auto-dépositaire qui se connecte facilement à diverses applications. L'extension de navigateur Alby permet une interaction fluide avec les sites web, facilitant les paiements et la vérification d'identité directement depuis votre navigateur. Pour les utilisateurs mobiles, Alby Go offre un portefeuille convivial pour gérer les transactions en déplacement. De plus, Alby fournit des API pour intégrer les paiements en bitcoin dans n'importe quelle application et interagir par programmation avec les portefeuilles Lightning de bitcoin.
