description: |
  Fondation suisse à but non lucratif engagée dans la défense des droits numériques. STF œuvre à préserver la robustesse, la confidentialité et l’interopérabilité d’Internet, notamment à travers le développement de Session, un protocole de communication décentralisé, sécurisé et sans autorisation, utilisé dans la messagerie Session. Son action s’inscrit dans une vision d’un Internet libre, ouvert et respectueux de la vie privée.